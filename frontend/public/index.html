<!DOCTYPE html>
<html lang="en" >
  <head>
    <meta charset="utf-8" />
    <link
      rel="icon"
      href="./icon.webp"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta 
      name="description" 
      content="Bibek Ghosh is a Full Stack Developer specializing in React, JavaScript, and modern web technologies. Passionate about building scalable web apps and seamless user experiences." 
      />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="image"
      href="https://images.pexels.com/photos/36244506/pexels-photo-36244506.png?auto=compress&cs=tinysrgb&h=500"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var shouldDark = stored ? stored === "dark" : prefersDark;
          if (shouldDark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <title>Bibek Ghosh - Developer</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
